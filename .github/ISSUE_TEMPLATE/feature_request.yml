name: Feature request
description: Suggest a new feature or enhancement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the user-facing problem or limitation. Avoid jumping to a solution.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What you'd like to see happen. Mockups or examples welcome.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about, and why this one is preferred.
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Related issues, prior art in other apps, or anything else relevant.
    validations:
      required: false
